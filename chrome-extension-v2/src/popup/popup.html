<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Altech EZLynx Filler (V2)</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header class="hdr">
        <span class="brand">Altech <span class="v2">V2</span></span>
        <span class="ver" id="ver">v0.8.0</span>
    </header>

    <!-- Client card — loaded applicant name + address -->
    <section class="card client-card" id="clientCard">
        <div class="label">Loaded client</div>
        <div class="name" id="clientName">No client loaded</div>
        <div class="addr" id="clientAddr"></div>
        <div class="meta" id="clientMeta">Open the Altech app and click “Send to Extension”</div>
    </section>

    <!-- Route card — current EZLynx tab route -->
    <section class="card" id="routeCard">
        <div class="label">Current route</div>
        <div class="route" id="routeName">—</div>
        <div class="meta" id="routeMeta">Open an EZLynx page to detect the route</div>
    </section>

    <!-- Primary action: Fill Page -->
    <div class="actions">
        <button class="primary" id="fillBtn" disabled>Fill this page</button>
        <div class="secondary-row">
            <button class="secondary" id="reconToolBtn" disabled>🔍 Open Recon Tool</button>
            <button class="secondary" id="exportBtn" disabled>⇩ Export JSON</button>
        </div>
    </div>
    <div class="hint" id="fillHint">Waiting for client + EZLynx tab…</div>

    <!-- Last fill report summary -->
    <section class="card report" id="reportCard" hidden>
        <div class="label">Last fill report</div>
        <div class="counts" id="reportCounts"></div>
        <div class="lexis-strip" id="lexisStrip" hidden></div>
    </section>

    <!-- Admin-only Recon Tools section — collapsible,
         visible when altech_admin_recon OR isAdmin is set. -->
    <details class="card recon-card" id="reconSection" hidden>
        <summary class="recon-summary">
            <span class="label">Recon Tools <span class="admin-badge">admin</span></span>
            <span class="chev">▸</span>
        </summary>
        <div class="recon-grid">
            <button class="recon-btn" data-feature="page-inventory">📋 Page Inventory</button>
            <button class="recon-btn" data-feature="registry-audit">🔍 Registry Audit</button>
            <button class="recon-btn" data-feature="dry-run">🧪 Dry Run</button>
            <button class="recon-btn" data-feature="issue-capture">📸 Issue Capture</button>
            <button class="recon-btn" data-feature="cascade-test">⛓ Cascade Test</button>
            <button class="recon-btn" data-feature="diff-registry">↔ Diff Registry</button>
        </div>
        <div class="recon-status" id="reconStatus"></div>
    </details>

    <footer class="ftr">
        <span>V2 — atom orchestrator · Ctrl+Shift+A to fill</span>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
