<header class="no-print">
    <div class="header-top">
        <div class="logo tool-header-brand">
            <span>📬 Returned Mail Tracker</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button id="rmtExportBtn" class="rmt-header-btn" title="Export all entries as CSV">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export CSV
            </button>
        </div>
    </div>
</header>

<main class="rmt-main">

    <!-- ── Address Validator ─────────────────────────────────────────────── -->
    <section class="rmt-section rmt-validator-section">
        <h3 class="rmt-section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Address Validator
        </h3>
        <p class="rmt-section-hint">Enter a mailing address to check its deliverability before logging.</p>
        <div class="rmt-validator-row">
            <input id="rmtAddrInput" type="text" class="rmt-input" placeholder="e.g. 123 Main St, Portland OR 97201" autocomplete="off">
            <button id="rmtValidateBtn" type="button" class="rmt-btn-primary">Validate</button>
        </div>
        <div id="rmtValidationResult"></div>
    </section>

    <!-- ── Log Entry Form ────────────────────────────────────────────────── -->
    <section id="rmtFormSection" class="rmt-section rmt-form-section">
        <h3 class="rmt-section-title" id="rmtFormTitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Log Entry
        </h3>
        <form id="rmtLogForm" class="rmt-form" novalidate>
            <div class="rmt-form-grid">
                <div class="rmt-field">
                    <label for="rmtClientName">Client Name <span class="rmt-required">*</span></label>
                    <input id="rmtClientName" type="text" class="rmt-input" placeholder="Full name" required autocomplete="off">
                </div>
                <div class="rmt-field">
                    <label for="rmtPolicyNumber">Policy Number</label>
                    <input id="rmtPolicyNumber" type="text" class="rmt-input" placeholder="Optional" autocomplete="off">
                </div>
                <div class="rmt-field rmt-field-wide">
                    <label for="rmtClientAddress">Mailing Address <span class="rmt-required">*</span></label>
                    <input id="rmtClientAddress" type="text" class="rmt-input" placeholder="Street, City, State ZIP" required autocomplete="off">
                </div>
                <div class="rmt-field">
                    <label for="rmtReturnReason">Return Reason</label>
                    <select id="rmtReturnReason" class="rmt-select">
                        <option value="">— Select reason —</option>
                        <option>Moved — No Forwarding Address</option>
                        <option>Undeliverable As Addressed</option>
                        <option>Attempted — Not Known</option>
                        <option>Vacant</option>
                        <option>Refused</option>
                        <option>Wrong Address</option>
                        <option>Return to Sender</option>
                        <option>No Such Number</option>
                        <option>Insufficient Address</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="rmt-field">
                    <label for="rmtDateReturned">Date Returned</label>
                    <input id="rmtDateReturned" type="date" class="rmt-input">
                </div>
                <div class="rmt-field">
                    <label for="rmtStatus">Status</label>
                    <select id="rmtStatus" class="rmt-select">
                        <option value="pending">Pending</option>
                        <option value="contacted">Contacted</option>
                        <option value="resolved">Resolved</option>
                    </select>
                </div>
                <div class="rmt-field rmt-field-wide">
                    <label for="rmtNotes">Notes</label>
                    <textarea id="rmtNotes" class="rmt-textarea" rows="2" placeholder="Any additional details…"></textarea>
                </div>
            </div>
            <div class="rmt-form-actions">
                <button id="rmtSubmitBtn" type="submit" class="rmt-btn-primary">Add Entry</button>
                <button id="rmtCancelBtn" type="button" class="rmt-btn-ghost" style="display:none">Cancel</button>
            </div>
        </form>
    </section>

    <!-- ── Log Table ─────────────────────────────────────────────────────── -->
    <section class="rmt-section rmt-table-section">
        <div class="rmt-table-toolbar">
            <h3 class="rmt-section-title rmt-section-title-inline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Returned Mail Log
                <span class="rmt-count-badge" id="rmtCount"></span>
            </h3>
            <div class="rmt-table-controls">
                <input id="rmtSearchInput" type="search" class="rmt-input rmt-search" placeholder="Search…" autocomplete="off">
                <select id="rmtFilterStatus" class="rmt-select rmt-filter">
                    <option value="all">All statuses</option>
                    <option value="pending">Pending</option>
                    <option value="contacted">Contacted</option>
                    <option value="resolved">Resolved</option>
                </select>
            </div>
        </div>

        <div id="rmtEmpty" class="rmt-empty" style="display:none">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="rmt-empty-icon"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <p>No returned mail entries yet.</p>
            <p class="rmt-empty-sub">Use the form above to log your first entry.</p>
        </div>

        <div class="rmt-table-wrap">
            <table class="rmt-table">
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Address</th>
                        <th>Reason</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Policy #</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="rmtTableBody"></tbody>
            </table>
        </div>
    </section>

</main>
