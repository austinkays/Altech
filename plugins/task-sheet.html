<header class="no-print">
    <div class="header-top">
        <div class="logo tool-header-brand">
            <span>Task Sheet</span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="ts-print-btn" class="ts-header-btn" style="display:none" title="Print task sheet">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
                </svg>
                Print
            </button>
            <button id="ts-show-all-btn" class="ts-header-btn ts-header-btn-outline" style="display:none" title="Print all tasks (remove 20-row cap)">
                Print All
            </button>
            <button id="ts-dedupe-btn" class="ts-header-btn ts-header-btn-outline" style="display:none" title="Collapse repeated task types, showing most urgent per type">
                Dedupe
            </button>
            <button id="ts-clear-btn" class="ts-header-btn ts-header-btn-outline" style="display:none" title="Upload new CSV">
                Upload New
            </button>
        </div>
    </div>
</header>

<main class="ts-container">
    <!-- Error message -->
    <div id="ts-error" class="ts-error" style="display:none"></div>

    <!-- Drop zone -->
    <div id="ts-drop-zone" class="ts-drop-zone">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="ts-drop-icon">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="ts-drop-label">Click or drag HawkSoft CSV(s) here</p>
        <p class="ts-drop-hint">Drop both Total Overdue + Total Due Today at once, or load one at a time</p>
        <input type="file" id="ts-file-input" accept=".csv" multiple hidden>
    </div>

    <!-- Secondary drop zone — shown after first CSV loaded, hidden once second is added -->
    <div id="ts-add-drop-zone" class="ts-add-drop-zone" style="display:none">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Add second CSV to merge</span>
        <input type="file" id="ts-add-file-input" accept=".csv" hidden>
    </div>

    <!-- Agent filter bar — shown in team mode only -->
    <div id="ts-agent-filter" class="ts-agent-filter no-print" style="display:none"></div>

    <!-- Meta bar (agency, date, counts) -->
    <div id="ts-meta" class="ts-meta" style="display:none"></div>

    <!-- Table output -->
    <div id="ts-output" class="ts-output"></div>
</main>
