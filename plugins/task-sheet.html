<header class="header-top no-print">
    <div class="tool-header-brand">
        <div class="logo-controls">
            <button class="btn-home" onclick="App.goHome()" aria-label="Home">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </button>
            <button class="btn-dark-toggle" onclick="App.toggleDarkMode && App.toggleDarkMode()" aria-label="Toggle dark mode">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <span class="tool-header-title">Task Sheet</span>
        </div>
        <div class="header-actions">
            <button id="ts-print-btn" class="ts-header-btn" style="display:none" title="Print task sheet">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
                </svg>
                Print
            </button>
            <button id="ts-clear-btn" class="ts-header-btn ts-header-btn-outline" style="display:none" title="Upload new CSV">
                Upload New
            </button>
        </div>
    </div>
</header>

<main class="ts-container">
    <!-- Error message -->
    <div id="ts-error" class="ts-error" style="display:none"></div>

    <!-- Drop zone -->
    <div id="ts-drop-zone" class="ts-drop-zone">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="ts-drop-icon">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="ts-drop-label">Click or drag a HawkSoft CSV here</p>
        <p class="ts-drop-hint">Exported from HawkSoft &rarr; My Tasks</p>
        <input type="file" id="ts-file-input" accept=".csv" hidden>
    </div>

    <!-- Meta bar (agency, date, counts) -->
    <div id="ts-meta" class="ts-meta" style="display:none"></div>

    <!-- Table output -->
    <div id="ts-output" class="ts-output"></div>
</main>
