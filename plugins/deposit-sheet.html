<header class="no-print">
    <div class="header-top">
        <div class="logo tool-header-brand">
            <span>Deposit Sheet</span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="ds-print-btn" class="ds-header-btn" style="display:none" title="Print deposit sheet">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
                </svg>
                Print
            </button>
            <button id="ds-clear-btn" class="ds-header-btn ds-header-btn-outline" style="display:none" title="Upload new CSV">
                Upload New
            </button>
        </div>
    </div>
</header>

<main class="ds-container">
    <div id="ds-error" class="ds-error" style="display:none"></div>

    <!-- Drop zone -->
    <div id="ds-drop-zone" class="ds-drop-zone">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="ds-drop-icon">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="ds-drop-label">Click or drag HawkSoft Export CSV here</p>
        <p class="ds-drop-hint">Invoice rows are removed automatically — Receipts only</p>
        <input type="file" id="ds-file-input" accept=".csv" hidden>
    </div>

    <div class="ds-left-col">

    <!-- Meta bar -->
    <div id="ds-meta" class="ds-meta" style="display:none"></div>

    <!-- Bill counter (cash only, shown when cash rows exist) -->
    <div id="ds-bill-counter" class="ds-bill-counter" style="display:none">
        <div class="ds-bill-counter-title no-print">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Cash Counter
        </div>
        <div class="ds-bill-grid">
            <div class="ds-bill-row">
                <span class="ds-bill-denom">$100</span>
                <span class="ds-bill-x no-print">×</span>
                <input type="number" class="ds-bill-input no-print" data-denom="100" min="0" value="0" placeholder="0">
                <span class="ds-bill-print-x ds-print-only">×</span>
                <span class="ds-bill-count ds-print-only" id="ds-bill-count-100">0</span>
                <span class="ds-bill-print-eq ds-print-only">=</span>
                <span class="ds-bill-total" id="ds-bill-100">—</span>
            </div>
            <div class="ds-bill-row">
                <span class="ds-bill-denom">$50</span>
                <span class="ds-bill-x no-print">×</span>
                <input type="number" class="ds-bill-input no-print" data-denom="50" min="0" value="0" placeholder="0">
                <span class="ds-bill-print-x ds-print-only">×</span>
                <span class="ds-bill-count ds-print-only" id="ds-bill-count-50">0</span>
                <span class="ds-bill-print-eq ds-print-only">=</span>
                <span class="ds-bill-total" id="ds-bill-50">—</span>
            </div>
            <div class="ds-bill-row">
                <span class="ds-bill-denom">$20</span>
                <span class="ds-bill-x no-print">×</span>
                <input type="number" class="ds-bill-input no-print" data-denom="20" min="0" value="0" placeholder="0">
                <span class="ds-bill-print-x ds-print-only">×</span>
                <span class="ds-bill-count ds-print-only" id="ds-bill-count-20">0</span>
                <span class="ds-bill-print-eq ds-print-only">=</span>
                <span class="ds-bill-total" id="ds-bill-20">—</span>
            </div>
            <div class="ds-bill-row">
                <span class="ds-bill-denom">$10</span>
                <span class="ds-bill-x no-print">×</span>
                <input type="number" class="ds-bill-input no-print" data-denom="10" min="0" value="0" placeholder="0">
                <span class="ds-bill-print-x ds-print-only">×</span>
                <span class="ds-bill-count ds-print-only" id="ds-bill-count-10">0</span>
                <span class="ds-bill-print-eq ds-print-only">=</span>
                <span class="ds-bill-total" id="ds-bill-10">—</span>
            </div>
            <div class="ds-bill-row">
                <span class="ds-bill-denom">$5</span>
                <span class="ds-bill-x no-print">×</span>
                <input type="number" class="ds-bill-input no-print" data-denom="5" min="0" value="0" placeholder="0">
                <span class="ds-bill-print-x ds-print-only">×</span>
                <span class="ds-bill-count ds-print-only" id="ds-bill-count-5">0</span>
                <span class="ds-bill-print-eq ds-print-only">=</span>
                <span class="ds-bill-total" id="ds-bill-5">—</span>
            </div>
            <div class="ds-bill-row">
                <span class="ds-bill-denom">$1</span>
                <span class="ds-bill-x no-print">×</span>
                <input type="number" class="ds-bill-input no-print" data-denom="1" min="0" value="0" placeholder="0">
                <span class="ds-bill-print-x ds-print-only">×</span>
                <span class="ds-bill-count ds-print-only" id="ds-bill-count-1">0</span>
                <span class="ds-bill-print-eq ds-print-only">=</span>
                <span class="ds-bill-total" id="ds-bill-1">—</span>
            </div>
            <div class="ds-bill-row ds-bill-row-total">
                <span class="ds-bill-denom">Counted</span>
                <span class="ds-bill-x no-print"></span>
                <span class="ds-bill-spacer no-print"></span>
                <span class="ds-bill-total ds-bill-grand" id="ds-bill-counted">$0.00</span>
            </div>
        </div>
    </div>

    <!-- Table output -->
    <div id="ds-output" class="ds-output"></div>

    </div><!-- /.ds-left-col -->

    <!-- Print-only: Chase deposit slip attachment panel -->
    <div class="ds-receipt-area ds-print-only">
        <div class="ds-receipt-area-heading">Chase Deposit Slip</div>
        <div class="ds-receipt-slip-box">
            <span class="ds-receipt-slip-hint">Tape slip here</span>
        </div>
        <div class="ds-receipt-notes-heading">Notes</div>
        <div class="ds-receipt-notes"></div>
    </div>

</main>
