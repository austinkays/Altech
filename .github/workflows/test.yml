name: Tests

# Gates PRs with the full Jest suite + the doc/size audit. Until this existed
# the only PR check was the Vercel preview deploy, so a regression (or the
# known-failing test) could ship to main unnoticed. Runs on every PR and on
# pushes to feature branches; main is intentionally skipped (post-merge — the
# Vercel production deploy handles main, and the PR run already gated it).
on:
  pull_request:
  push:
    branches-ignore:
      - main

# A newer push to the same branch/PR cancels the older in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint-aad + audit-docs + jest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # `npm ci` (not the setup-node npm cache — that cache step is a common
      # fast-fail on a fresh workflow and only saves install time). `npm ci`
      # is clean+deterministic from the committed lockfile (~15s locally).
      - name: Install dependencies
        run: npm ci

      - name: Doc & size audit
        run: npm run audit-docs

      - name: Test suite (pretest runs lint-aad, then jest)
        run: npm test
